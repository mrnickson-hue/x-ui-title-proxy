name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o x-ui-proxy-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o x-ui-proxy-linux-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            x-ui-proxy-linux-amd64
            x-ui-proxy-linux-arm64
          generate_release_notes: true
